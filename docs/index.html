<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Planning Semaine</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 16px 20px 8px;
            color: white;
        }
        h1 { font-size: 22px; font-weight: 700; }
        .timestamp { font-size: 11px; opacity: 0.8; margin-top: 2px; }
        .dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: background 0.3s;
        }
        .dot.active { background: white; }
        .carousel {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        .slides {
            display: flex;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            height: 100%;
        }
        .slide {
            min-width: 100vw;
            padding: 0 16px 20px;
            overflow-y: auto;
        }
        .week-title {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 12px;
            backdrop-filter: blur(10px);
        }
        .day-name {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            font-size: 13px;
            margin: 12px 0 6px;
            padding-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .course {
            background: white;
            padding: 12px 14px;
            margin-bottom: 6px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .time {
            color: #667eea;
            font-weight: 700;
            font-size: 13px;
            min-width: 42px;
        }
        .matiere {
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        .error {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .nav-hint {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            padding: 4px 0 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📅 VOTRE PLANNING</h1>
        <div class="timestamp" id="timestamp">Chargement...</div>
    </div>
    <div class="dots" id="dots"></div>
    <div class="nav-hint" id="hint"></div>
    <div class="carousel">
        <div class="slides" id="slides"></div>
    </div>

    <script>
        let currentSlide = 0;
        let totalSlides = 0;
        let startX = 0;
        let isDragging = false;

        async function loadPlanning() {
            try {
                const response = await fetch('./planning.json');
                if (!response.ok) throw new Error('Fichier non trouvé');
                const data = await response.json();

                const timestamp = new Date(data.timestamp);
                document.getElementById('timestamp').textContent = '⏰ ' + timestamp.toLocaleString('fr-FR', {
                    day: '2-digit', month: '2-digit', year: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });

                const weeks = Object.values(data.weeks);
                totalSlides = weeks.length;

                const slidesEl = document.getElementById('slides');
                const dotsEl = document.getElementById('dots');
                slidesEl.innerHTML = '';
                dotsEl.innerHTML = '';

                weeks.forEach((weekData, i) => {
                    const slide = document.createElement('div');
                    slide.className = 'slide';

                    let html = `<div class="week-title">SEMAINE ${weekData.semaine}</div>`;
                    let currentDay = null;
                    for (const course of weekData.courses) {
                        if (course.date !== currentDay) {
                            currentDay = course.date;
                            html += `<div class="day-name">✨ ${currentDay.toUpperCase()}</div>`;
                        }
                        html += `<div class="course"><span class="time">${course.time}</span><span class="matiere">${course.matiere}</span></div>`;
                    }
                    slide.innerHTML = html;
                    slidesEl.appendChild(slide);

                    const dot = document.createElement('div');
                    dot.className = 'dot' + (i === 0 ? ' active' : '');
                    dotsEl.appendChild(dot);
                });

                if (weeks.length > 1) {
                    document.getElementById('hint').textContent = '← glissez pour naviguer →';
                }

                setupSwipe();
            } catch (e) {
                document.getElementById('slides').innerHTML = `<div class="slide"><div class="error">Erreur: ${e.message}</div></div>`;
            }
        }

        function goTo(index) {
            currentSlide = Math.max(0, Math.min(index, totalSlides - 1));
            document.getElementById('slides').style.transform = `translateX(-${currentSlide * 100}vw)`;
            document.querySelectorAll('.dot').forEach((d, i) => {
                d.classList.toggle('active', i === currentSlide);
            });
        }

        function setupSwipe() {
            const carousel = document.querySelector('.carousel');

            carousel.addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
                isDragging = true;
            }, { passive: true });

            carousel.addEventListener('touchend', e => {
                if (!isDragging) return;
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) {
                    goTo(currentSlide + (diff > 0 ? 1 : -1));
                }
                isDragging = false;
            }, { passive: true });
        }

        loadPlanning();
        setInterval(loadPlanning, 3600000);
    </script>
</body>
</html>
