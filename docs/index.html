<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Semaine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .timestamp {
            color: #888;
            font-size: 12px;
            margin-bottom: 24px;
        }
        .week {
            margin-bottom: 24px;
        }
        .week-title {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .day {
            margin-bottom: 16px;
        }
        .day-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            padding-left: 12px;
        }
        .course {
            background: #f5f5f5;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 3px solid #764ba2;
        }
        .time {
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
        }
        .matiere {
            color: #333;
            margin-top: 4px;
            font-size: 14px;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 VOTRE PLANNING</h1>
        <div class="timestamp" id="timestamp">Chargement...</div>
        <div id="content"></div>
    </div>

    <script>
        async function loadPlanning() {
            try {
                const response = await fetch('./planning.json');
                if (!response.ok) throw new Error('Fichier non trouvé');

                const data = await response.json();
                const timestamp = new Date(data.timestamp);
                const timeStr = timestamp.toLocaleString('fr-FR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                document.getElementById('timestamp').textContent = `⏰ Dernière mise à jour : ${timeStr}`;

                let html = '';
                for (const [weekStr, weekData] of Object.entries(data.weeks)) {
                    html += `<div class="week"><div class="week-title">SEMAINE ${weekData.semaine}</div>`;

                    let currentDay = null;
                    for (const course of weekData.courses) {
                        if (course.date !== currentDay) {
                            currentDay = course.date;
                            html += `<div class="day"><div class="day-name">✨ ${currentDay.toUpperCase()}</div>`;
                        }
                        html += `<div class="course"><div class="time">- ${course.time} : <strong>${course.matiere}</strong></div></div>`;
                    }
                    html += '</div></div>';
                }

                document.getElementById('content').innerHTML = html || '<div class="error">Pas de planning disponible</div>';
            } catch (error) {
                document.getElementById('content').innerHTML = `<div class="error">Erreur: ${error.message}</div>`;
            }
        }

        loadPlanning();
        // Rafraîchir toutes les heures
        setInterval(loadPlanning, 3600000);
    </script>
</body>
</html>
